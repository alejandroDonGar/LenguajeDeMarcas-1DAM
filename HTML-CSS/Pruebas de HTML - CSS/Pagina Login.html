<html>
    <head>
        <title>Login</title>
        <meta charset="utf-8">
        <style>
            body {
                display:flex;
                height:95vh;
                justify-content:center;
                align-items:center;
                background-color:lightyellow;
            }
            #contenedor {
                border:3px solid navy;
                background-color:white;
                display:grid;
                grid-template-columns:1fr 3fr;
                gap:20px;
                padding:10px;
            }
            a {
                display:flex;
                justify-content:center;
                align-items:center;
                font-weight:bold;
                font-size:3em;
                padding:20px;
            }

            #contenedor > div {
                display:flex;
                justify-content:center;
                align-items:center;
            }

            input[type="submit"] {
                border:2px solid red;
                width:100px;
                padding:10px;
                font-weight:bold;
                font-size:1em;
                background-color:pink;
                border-radius:15px;
            }
            input[type="submit"]:active {
                background-color:lime;
            }
            #enviar {
                display:flex;
                grid-column-start:span 2;
            }
            input {
                border:none;
            }
            label {
                font-weight:bold;
            }
        </style>
    <script type="text/javascript" src="https://www3.gobiernodecanarias.org/educacion/cau_ce/estadisticasweb/scripts/piwik-eforma.js"></script><link rel="stylesheet" type="text/css" href="https://www3.gobiernodecanarias.org/educacion/cau_ce/estadisticasweb/scripts/cookies/cookies.css"/><script  type="text/javascript" src="https://www3.gobiernodecanarias.org/educacion/cau_ce/estadisticasweb/scripts/cookies/cookies.js"></script><script type="text/javascript" src="https://www3.gobiernodecanarias.org/educacion/cau_ce/estadisticasweb/scripts/cookies/cookies-html.js"></script></head>
    <body>
        <form action="login.php">
        <div id="contenedor">
            <div>
                <img src="http://lnd.angelmelchor.pro/tiny.jpg">
            </div>
            <a>LOGÍSTICA,S.L.</a>
            <label for="nombre">Nombre: </label>
            <input id="nombre" type="text" name="username" placeholder="Introduce tu nombre">
            <label for="passwd">Contraseña: </label>
            <input id="passwd" type="password" name="passwd" placeholder="Introduce tu contraseña">
            <div id="enviar">
                <input type="submit" value="Login">
            </div>
        </div>
        </form>
    </body>
</html>
