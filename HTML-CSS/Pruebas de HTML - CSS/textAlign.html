<html>
	<head>
		<meta charset="tuf-8">
		<title>Prueba Text Align</title>
		<style>
			div {
				border:1px solid black;
			}
			.div50 {
				text-align:center;
				margin:1em;
				padding:1em 0em;
				width:50%;
				border:1px solid black;
			}
			a {
				margin-right:20px;
				padding:0.5em;
				border:1px solid black;
			}
			img {
				padding:0.5em;
				margin-right:1em;
				border:1px solid black;
			}
		</style>
	</head>
	<body>
		<div>
			<div class="div50">
				<a>Elemento 1</a>
				<img src="tiny.jpg">
				<a>Elemento 3</a>
			</div>
		</div>
	</body>
</html>
