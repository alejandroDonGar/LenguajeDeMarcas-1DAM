<html>
    <head>
        <meta charset="utf-8">
        <title>27.11.2025-1º-JS</title>
    </head>
    <body>
        <input type="password" id="usuario">
        <br>
        <button onclick="passwd()">Ver Password</button>
        <script>
            function passwd() {
                const elemento=document.getElementById("usuario");
                const listaBotones=document.getElementsByTagName("button");
                listaBotones[0].style.color="white";
                switch (elemento.type) {
                    case "text":
                        elemento.type="password";
                        listaBotones[0].style.backgroudColor="green";
                        break;
                    case "password";
                        elemento.type="text";
                        listaBotones[0].style.backgroundColor="red";
                        break;
                }
            }
        </script>
    </body>
</html>
